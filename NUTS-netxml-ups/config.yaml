name: "Network UPS Tools (netxml-ups)"
version: "1.0.1"
slug: "nuts_netxml_ups"
description: "Custom NUT addon with netxml-ups driver for Eaton UPS. The official hassio-addons/app-nut dropped netxml-ups support (see issue #505), so this addon compiles it from source."
arch:
  - amd64
host_network: true
init: false
boot: auto
startup: services
options:
  device_name: "eaton_sai"
  driver: "netxml-ups"
  port: "http://192.168.1.100"
  username: "admin"
  password: ""
schema:
  device_name: str
  driver: str
  port: str
  username: str
  password: password
ports_description:
  3493/tcp: NUT Server
